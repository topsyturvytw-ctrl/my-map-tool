<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Google 多點路線規劃工具</title>
    <style>
        body { margin: 0; padding: 0; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial, sans-serif; display: flex; height: 100vh; }
        #sidebar { width: 350px; background: #f8f9fa; box-shadow: 2px 0 5px rgba(0,0,0,0.1); display: flex; flex-direction: column; z-index: 1000; }
        #map-container { flex: 1; height: 100%; position: relative; background: #e5e3df; }
        iframe { width: 100%; height: 100%; border: 0; }
        .padding-box { padding: 15px; }
        h3 { margin-top: 0; color: #333; }
        .input-group { display: flex; margin-bottom: 8px; gap: 5px; }
        input { flex: 1; padding: 8px; border: 1px solid #ccc; border-radius: 4px; }
        button { padding: 8px 12px; background: #007bff; color: white; border: none; border-radius: 4px; cursor: pointer; font-weight: bold; }
        button:hover { background: #0056b3; }
        button.delete-btn { background: #dc3545; padding: 4px 8px; font-weight: normal; margin-left: auto; border: none; border-radius: 4px; color: white; cursor: pointer; }
        button.delete-btn:hover { background: #bd2130; }
        #info-panel { background: #e9ecef; border-radius: 4px; margin-top: 15px; font-size: 14px; }
        .location-item { display: flex; align-items: center; background: white; padding: 8px; margin-bottom: 5px; border: 1px solid #ddd; border-radius: 4px; }
        #location-list { max-height: 350px; overflow-y: auto; margin-top: 10px; }
    </style>
</head>
<body>

    <div id="sidebar">
        <div class="padding-box" style="border-bottom: 1px solid #ddd;">
            <h3>📍 Google 多點規劃器</h3>
            <div class="input-group">
                <input type="text" id="search-input" placeholder="輸入地點（如：樹林國小）">
                <button onclick="addLocationFromInput()">新增</button>
            </div>
            <p style="font-size: 12px; color: #666; margin: 5px 0;">* 提示：請輸入明確的繁體中文地名</p>
        </div>

        <div class="padding-box" style="flex: 1; display: flex; flex-direction: column;">
            <strong>📋 規劃的地點清單</strong>
            <div id="location-list"></div>
            <div id="info-panel" class="padding-box">
                <strong>📊 路線摘要</strong>
                <div id="summary-content" style="margin-top: 5px; line-height: 1.5;">請先新增至少 2 個地點。</div>
            </div>
        </div>
    </div>

    <div id="map-container">
        <div id="map-placeholder" style="display:flex; justify-content:center; align-items:center; height:100%; color:#666;">
            請在左側輸入並新增地點，地圖將自動生成。
        </div>
    </div>
    <script>
        let locations = [];

        // 1. 新增地點功能
        function addLocationFromInput() {
            const input = document.getElementById('search-input');
            const query = input.value.trim();
            if (!query) return;

            locations.push(query);
            updateLocationListUI();
            renderGoogleMap();
            input.value = '';
        }

        // 2. 刪除特定地點功能
        function deleteLocation(index) {
            locations.splice(index, 1);
            updateLocationListUI();
            renderGoogleMap();
        }

        // 3. 更新左側地點列表顯示
        function updateLocationListUI() {
            const listContainer = document.getElementById('location-list');
            listContainer.innerHTML = '';
            
            locations.forEach((loc, index) => {
                const item = document.createElement('div');
                item.className = 'location-item';
                item.innerHTML = `
                    <span style="flex:1; overflow:hidden; text-overflow:ellipsis; white-space:nowrap;">
                        <strong>${index + 1}.</strong> ${loc}
                    </span>
                    <button class="delete-btn" onclick="deleteLocation(${index})">✕</button>
                `;
                listContainer.appendChild(item);
            });
        }

        // 4. 動態生成 Google Maps 嵌入網址
        function renderGoogleMap() {
            const mapContainer = document.getElementById('map-container');
            const summary = document.getElementById('summary-content');

            if (locations.length === 0) {
                mapContainer.innerHTML = '<div style="display:flex; justify-content:center; align-items:center; height:100%; color:#666;">請在左側輸入並新增地點，地圖將自動生成。</div>';
                summary.innerHTML = '請先新增至少 2 個地點。';
                return;
            }

            if (locations.length === 1) {
                // 只有 1 個點：捨棄大括號，改用標準字串加法
                const queryStr = encodeURIComponent(locations[0]);
                const finalUrl = 'https://google.com' + queryStr + '&hl=zh-TW&z=15&output=embed';
                
                mapContainer.innerHTML = '<iframe src="' + finalUrl + '"></iframe>';
                summary.innerHTML = '已定位 1 個地點，請加入第 2 個地點以生成導航路線。';
                return;
            }

            // 有 2 個點以上
            const origin = encodeURIComponent(locations[0]);
            const destination = encodeURIComponent(locations[locations.length - 1]);
            
            let googleMapsUrl = 'https://google.com' + origin + '&daddr=' + destination + '&hl=zh-TW&z=14&output=embed';
            
            // 超過 2 個點，串接中間點
            if (locations.length > 2) {
                const middlePoints = locations.slice(1, -1).map(l => encodeURIComponent(l));
                const middleStr = middlePoints.join('+to:');
                googleMapsUrl = 'https://google.com' + origin + '&daddr=' + middleStr + '+to:' + destination + '&hl=zh-TW&z=14&output=embed';
            }

            mapContainer.innerHTML = '<iframe src="' + googleMapsUrl + '"></iframe>';

            summary.innerHTML = `
                📍 總站數：<b>${locations.length}</b> 站<br>
                🚗 起點：${locations[0]}<br>
                🏁 終點：${locations[locations.length - 1]}<br>
                <span style="color:#28a745; font-size:12px; font-weight:bold;">* 導航路徑與交通時間已直接整合在右側 Google 地圖中。</span>
            `;
        }
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>路線規劃筆記本</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Ma+Shan+Zheng&family=Noto+Sans+TC:wght@400;500;700&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/rough.js/2.1.1/rough.js"></script>
<style>
  :root{
    --paper:#F3EEE4;
    --paper-2:#EAE3D3;
    --ink:#232323;
    --ink-soft:#5b5648;
    --red:#B23A2E;
    --jade:#3F6659;
    --amber:#D8A13E;
    --line:#D8D0BC;
  }
  *{box-sizing:border-box;}
  body{
    margin:0; padding:0; height:100vh; display:flex;
    background:var(--paper);
    color:var(--ink);
    font-family:'Noto Sans TC', sans-serif;
  }
  ::-webkit-scrollbar{width:8px;}
  ::-webkit-scrollbar-thumb{background:var(--line); border-radius:4px;}

  #sidebar{
    width:360px; min-width:360px; height:100%; overflow-y:auto;
    background:var(--paper-2);
    border-right:1px solid var(--line);
    display:flex; flex-direction:column;
  }
  .pad{padding:18px 20px;}
  .brand{border-bottom:1px solid var(--line);}
  .brand h1{
    font-family:'Ma Shan Zheng', cursive;
    font-size:30px; margin:0 0 2px 0; color:var(--ink);
    letter-spacing:1px;
  }
  .brand p{margin:0; font-size:12.5px; color:var(--ink-soft); line-height:1.5;}
  .section-title{
    font-size:11px; letter-spacing:2px; text-transform:uppercase;
    color:var(--ink-soft); margin:0 0 10px 0; font-weight:700;
  }
  .input-row{display:flex; gap:6px; margin-bottom:10px;}
  input[type=text], input[type=password]{
    flex:1; padding:9px 10px; border:1px solid var(--line);
    border-radius:6px; background:#fff;
    font-size:14px; font-family:'Noto Sans TC', sans-serif;
    color:var(--ink);
  }
  input[type=text]:focus{outline:2px solid var(--jade); outline-offset:1px;}
  button{
    font-family:'Noto Sans TC', sans-serif; font-weight:600;
    font-size:13.5px; border:none; border-radius:6px; cursor:pointer;
    padding:9px 12px; transition:transform .08s ease, background .15s ease;
  }
  button:active{transform:scale(0.97);}
  button:disabled{opacity:.5; cursor:not-allowed;}
  .btn-primary{background:var(--jade); color:#fff;}
  .btn-accent{background:var(--red); color:#fff;}
  .btn-ghost{background:transparent; color:var(--ink-soft); border:1px solid var(--line);}
  .btn-full{width:100%;}
  #location-list{margin:10px 0 6px 0; display:flex; flex-direction:column; gap:6px;}
  .loc-item{
    display:flex; align-items:center; gap:8px; background:#fff;
    border:1px solid var(--line); border-radius:7px;
    padding:8px 8px 8px 10px; cursor:grab;
  }
  .loc-item.dragging{opacity:.4;}
  .loc-item .badge{
    width:22px; height:22px; border-radius:50%;
    background:var(--paper-2); border:1.5px solid var(--ink);
    color:var(--ink); font-family:'JetBrains Mono',monospace;
    font-size:12px; font-weight:600; display:flex;
    align-items:center; justify-content:center; flex-shrink:0;
  }
  .loc-item .name{flex:1; font-size:14px; overflow:hidden; text-overflow:ellipsis; white-space:nowrap;}
  .loc-item .stack{display:flex; flex-direction:column; gap:2px;}
  .mini-btn{
    background:none; border:none; color:var(--ink-soft);
    cursor:pointer; font-size:11px; line-height:1;
    padding:2px 4px; border-radius:3px;
  }
  .mini-btn:hover{background:var(--paper-2); color:var(--ink);}
  .del-btn{background:none; border:none; color:var(--red); font-size:15px; cursor:pointer; padding:2px 6px;}
  .del-btn:hover{background:#f6e6e4; border-radius:4px;}
  .empty-hint{font-size:12.5px; color:var(--ink-soft); padding:10px 0;}
  .actions{display:flex; flex-direction:column; gap:8px; margin-top:14px;}
  .actions .row{display:flex; gap:8px;}
  .actions .row button{flex:1;}
  #status-line{font-size:12px; color:var(--ink-soft); min-height:16px; margin-top:6px;}
  #summary-panel{
    margin-top:16px; padding:14px; background:#fff;
    border:1px solid var(--line); border-radius:8px;
    font-size:13px; line-height:1.7;
  }
  #summary-panel .num{font-family:'JetBrains Mono', monospace; color:var(--red); font-weight:600;}
  #summary-panel .ai-note{font-size:12px; color:var(--ink-soft); margin-top:6px; font-style:italic;}
  #main{flex:1; height:100%; display:flex; flex-direction:column; min-width:0;}
  #tabs{display:flex; gap:6px; padding:14px 20px 0 20px; border-bottom:1px solid var(--line); background:var(--paper);}
  .tab-btn{
    background:none; border:none; padding:10px 16px; font-weight:600;
    font-size:13.5px; color:var(--ink-soft); border-bottom:3px solid transparent;
    border-radius:0; cursor:pointer;
  }
  .tab-btn.active{color:var(--ink); border-bottom:3px solid var(--red);}
  #canvas-wrap{flex:1; position:relative; overflow:auto; background:radial-gradient(var(--line) 1px, transparent 1px); background-size:22px 22px;}
  #diagram-svg{width:100%; min-height:100%; display:block;}
  #map-view{width:100%; height:100%; display:none;}
  #map-view iframe{width:100%; height:100%; border:0;}
  .map-placeholder{
    display:flex; align-items:center; justify-content:center;
    height:100%; color:var(--ink-soft); font-size:13.5px;
    padding:40px; text-align:center;
  }
  .node-name-text{font-family:'Ma Shan Zheng', cursive; font-size:19px; fill:var(--ink);}
  .node-badge-text{font-family:'JetBrains Mono', monospace; font-size:12px; font-weight:700; fill:var(--ink);}
  .leg-label-km{font-family:'JetBrains Mono', monospace; font-size:13px; font-weight:700; fill:var(--red);}
  .leg-label-min{font-family:'JetBrains Mono', monospace; font-size:11px; fill:var(--red); opacity:.85;}
  .tag-text{font-family:'Noto Sans TC', sans-serif; font-size:10.5px; fill:#fff; font-weight:700;}
  @media (max-width:820px){
    body{flex-direction:column; height:auto;}
    #sidebar{width:100%; min-width:0; height:auto; max-height:46vh;}
    #main{height:60vh;}
  }
</style>
</head>
<body>
<div id="sidebar">
  <div class="pad brand">
    <h1>路線規劃筆記本</h1>
    <p>手動拖曳排序，或讓 AI 依地點名稱建議一條省時的走法，再自動畫成手繪風向量圖。</p>
  </div>
  <div class="pad" style="border-bottom:1px solid var(--line);">
    <div class="section-title">OpenRouter API 金鑰</div>
    <div class="input-row"><input type="password" id="or-key-input" placeholder="貼上你的 OpenRouter API 金鑰"></div>
  </div>
  <div class="pad" style="border-bottom:1px solid var(--line);">
    <div class="section-title">新增地點</div>
    <div class="input-row">
      <input type="text" id="search-input" placeholder="例如：樹林國小、淡水">
      <button class="btn-primary" onclick="addLocationFromInput()">新增</button>
    </div>
    <div class="section-title" style="margin-top:14px;">地點清單（可拖曳排序）</div>
    <div id="location-list"></div>
    <div id="empty-hint" class="empty-hint">尚未新增地點，請先在上方輸入至少 2 個地點。</div>
    <div class="actions">
      <button class="btn-accent btn-full" id="btn-ai-order" onclick="aiSuggestOrder()">✨ AI 建議排序 + 估算距離時間</button>
      <div class="row">
        <button class="btn-ghost" id="btn-estimate" onclick="estimateCurrentOrder()">依目前順序估算</button>
        <button class="btn-ghost" id="btn-map" onclick="switchTab('map')">在 Google 地圖檢視</button>
      </div>
    </div>
    <div id="status-line"></div>
  </div>
  <div class="pad" style="flex:1;">
    <div id="summary-panel">
      <div class="section-title" style="margin-bottom:8px;">📊 路線摘要</div>
      <div id="summary-content">請先新增地點，並執行 AI 建議排序或估算。</div>
    </div>
  </div>
</div>
<div id="main">
  <div id="tabs">
    <button class="tab-btn active" data-tab="diagram" onclick="switchTab('diagram')">向量路線圖</button>
    <button class="tab-btn" data-tab="map" onclick="switchTab('map')">Google 地圖</button>
  </div>
  <div id="canvas-wrap">
    <svg id="diagram-svg" xmlns="http://www.w3.org/2000/svg"></svg>
    <div id="map-view">
      <div class="map-placeholder">請在左側新增地點後，切換到此頁查看 Google 地圖路線。</div>
    </div>
  </div>
</div>
<script>
  let locations = [];
  let legs = null;
  let aiNote = '';
  let dragSrcIndex = null;

  function uid(){
    return 'l' + Math.random().toString(36).slice(2,9);
  }

  function addLocationFromInput(){
    const input = document.getElementById('search-input');
    const query = input.value.trim();
    if(!query) return;
    locations.push({id: uid(), name: query});
    legs = null;
    input.value = '';
    renderAll();
  }

  function deleteLocation(id){
    locations = locations.filter(l => l.id !== id);
    legs = null;
    renderAll();
  }

  function moveItem(index, dir){
    const target = index + dir;
    if(target < 0 || target >= locations.length) return;
    [locations[index], locations[target]] = [locations[target], locations[index]];
    legs = null;
    renderAll();
  }
  function renderLocationList(){
    const list = document.getElementById('location-list');
    const emptyHint = document.getElementById('empty-hint');
    list.innerHTML = '';
    emptyHint.style.display = locations.length ? 'none' : 'block';

    locations.forEach((loc, index) => {
      const item = document.createElement('div');
      item.className = 'loc-item';
      item.draggable = true;
      item.innerHTML = `
        <div class="badge">${index+1}</div>
        <div class="name">${loc.name}</div>
        <div class="stack">
          <button class="mini-btn" onclick="moveItem(${index},-1)">▲</button>
          <button class="mini-btn" onclick="moveItem(${index},1)">▼</button>
        </div>
        <button class="del-btn" onclick="deleteLocation('${loc.id}')">✕</button>
      `;
      item.addEventListener('dragstart', () => { dragSrcIndex = index; item.classList.add('dragging'); });
      item.addEventListener('dragend', () => item.classList.remove('dragging'));
      item.addEventListener('dragover', (e) => e.preventDefault());
      item.addEventListener('drop', (e) => {
        e.preventDefault();
        const moved = locations.splice(dragSrcIndex, 1)[0];
        locations.splice(index, 0, moved);
        legs = null;
        renderAll();
      });
      list.appendChild(item);
    });
  }

  function setStatus(msg){ document.getElementById('status-line').innerText = msg; }
  function setButtonsDisabled(bool){
    document.querySelectorAll('button').forEach(b => b.disabled = bool);
  }

  async function aiSuggestOrder(){
    if(locations.length < 2) { setStatus('請至少新增兩個地點'); return; }
    const apiKey = document.getElementById('or-key-input').value.trim();
    if(!apiKey) { setStatus('請先輸入 OpenRouter API Key'); return; }

    setButtonsDisabled(true);
    setStatus('AI 正在規劃最短路徑...');

    const prompt = `請為這組地點規劃最有效率的旅遊順序: ${locations.map(l=>l.name).join(', ')}。請回傳嚴格的 JSON 格式: {"order": ["地名1", "地名2"...], "legs": [{"from":"地名1","to":"地名2","km":數字,"minutes":數字}, ...], "note": "簡單說明"}`;
    
    try {
      const res = await fetch("https://openrouter.ai/api/v1/chat/completions", {
        method: "POST",
        headers: {"Content-Type": "application/json", "Authorization": "Bearer " + apiKey},
        body: JSON.stringify({
          model: "meta-llama/llama-3.3-70b-instruct:free",
          messages: [{ role: "user", content: prompt }],
          response_format: { type: "json_object" }
        })
      });
      const data = await res.json();
      const result = JSON.parse(data.choices[0].message.content.replace(/```json|```/g,''));
      
      locations = result.order.map(n => locations.find(l => l.name === n));
      legs = result.legs.map(l => ({from: l.from, to: l.to, km: Number(l.km), minutes: Math.round(Number(l.minutes))}));
      aiNote = result.note;
      renderAll();
      setStatus('規劃完成！');
    } catch(e) { setStatus('錯誤: ' + e.message); }
    finally { setButtonsDisabled(false); }
  }
  function estimateCurrentOrder(){
    // 這裡可以預留呼叫 Google Maps 或計算邏輯的空間
    setStatus('目前順序估算功能待實作...');
  }

  function switchTab(tab){
    document.querySelectorAll('.tab-btn').forEach(b => b.classList.toggle('active', b.dataset.tab === tab));
    document.getElementById('diagram-svg').style.display = tab === 'diagram' ? 'block' : 'none';
    document.getElementById('map-view').style.display = tab === 'map' ? 'block' : 'none';
  }

  function renderSummary(){
    const content = document.getElementById('summary-content');
    if(!legs) { content.innerHTML = '尚未取得 AI 路線建議。'; return; }
    let totalKm = 0, totalMin = 0;
    legs.forEach(l => { totalKm += l.km; totalMin += l.minutes; });
    content.innerHTML = `預估總距離: <span class="num">${totalKm.toFixed(1)} km</span><br>預估總時間: <span class="num">${Math.floor(totalMin/60)}h ${totalMin%60}m</span><div class="ai-note">${aiNote}</div>`;
  }

  function renderDiagram(){
    const svg = document.getElementById('diagram-svg');
    svg.innerHTML = '';
    const rc = rough.svg(svg);
    const width = 600;
    
    locations.forEach((loc, i) => {
      const x = width / 2;
      const y = 100 + i * 150;
      
      // 繪製節點圓形
      svg.appendChild(rc.circle(x, y, 60, {fill: '#fff', strokeWidth: 2}));
      
      // 繪製節點名稱
      const text = document.createElementNS('http://www.w3.org/2000/svg', 'text');
      text.setAttribute('x', x); text.setAttribute('y', y + 5);
      text.setAttribute('text-anchor', 'middle');
      text.setAttribute('class', 'node-name-text');
      text.textContent = loc.name;
      svg.appendChild(text);

      // 繪製路段與 AI 數據 (數據顯示補丁)
      if(legs && legs[i]){
        svg.appendChild(rc.line(x, y + 30, x, y + 120, {strokeWidth: 2}));
        const label = document.createElementNS('http://www.w3.org/2000/svg', 'text');
        label.setAttribute('x', x + 15);
        label.setAttribute('y', y + 80);
        label.setAttribute('fill', 'red');
        label.setAttribute('font-weight', 'bold');
        label.textContent = `${legs[i].km}km / ${legs[i].minutes}min`;
        svg.appendChild(label);
      }
    });
  }

  function renderAll(){
    renderLocationList();
    renderSummary();
    renderDiagram();
  }

  // 初始化
  renderAll();
</script>
</body>
</html>

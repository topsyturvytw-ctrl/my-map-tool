<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>多點路線規劃與自動排序工具</title>
    <!-- 引入 Leaflet 地圖套件的 CSS 與 JS -->
    <link rel="stylesheet" href="https://unpkg.com" />
    <script src="https://unpkg.com"></script>
    <style>
        body { margin: 0; padding: 0; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial, sans-serif; display: flex; height: 100vh; }
        #sidebar { width: 350px; background: #f8f9fa; box-shadow: 2px 0 5px rgba(0,0,0,0.1); display: flex; flex-direction: column; z-index: 1000; }
        #map { flex: 1; height: 100%; }
        .padding-box { padding: 15px; }
        h3 { margin-top: 0; color: #333; }
        .input-group { display: flex; margin-bottom: 8px; gap: 5px; }
        input { flex: 1; padding: 8px; border: 1px solid #ccc; border-radius: 4px; }
        button { padding: 8px 12px; background: #007bff; color: white; border: none; border-radius: 4px; cursor: pointer; font-weight: bold; }
        button:hover { background: #0056b3; }
        button.delete-btn { background: #dc3545; padding: 4px 8px; }
        button.delete-btn:hover { background: #bd2130; }
        button.secondary-btn { background: #28a745; width: 100%; margin-top: 5px; }
        button.secondary-btn:hover { background: #218838; }
        #info-panel { background: #e9ecef; border-radius: 4px; margin-top: 15px; font-size: 14px; }
        .location-item { display: flex; align-items: center; background: white; padding: 8px; margin-bottom: 5px; border: 1px solid #ddd; border-radius: 4px; cursor: grab; }
        .location-item:active { cursor: grabbing; }
        .handle { margin-right: 10px; color: #888; font-weight: bold; }
        #location-list { max-height: 300px; overflow-y: auto; margin-top: 10px; }
    </style>
</head>
<body>

    <div id="sidebar">
        <div class="padding-box" style="border-bottom: 1px solid #ddd;">
            <h3>📍 多點路線規劃器</h3>
            <div class="input-group">
                <input type="text" id="search-input" placeholder="輸入地點（如：板橋車站）">
                <button onclick="addLocationFromInput()">新增</button>
            </div>
            <p style="font-size: 12px; color: #666; margin: 5px 0;">* 提示：也可以在右側地圖上點擊滑鼠右鍵直接選點</p>
            <button class="secondary-btn" onclick="autoOptimizeRoute()" style="background: #17a2b8;">✨ 自動優化排序 (最短路徑)</button>
            <button class="secondary-btn" onclick="calculateRoute()">🔍 重新計算路線</button>
        </div>

        <div class="padding-box" style="flex: 1; display: flex; flex-direction: column;">
            <strong>📋 地點順序 (可拖曳調整)</strong>
            <div id="location-list"></div>
            <div id="info-panel" class="padding-box">
                <strong>📊 路線摘要</strong>
                <div id="summary-content" style="margin-top: 5px; line-height: 1.5;">請先新增至少 2 個地點。</div>
            </div>
        </div>
    </div>

    <div id="map"></div>
    <script>
        // 1. 初始化地圖（預設中心點設在雙北）
        const map = L.map('map').setView([25.012, 121.465], 13);
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
            attribution: '© OpenStreetMap contributors'
        }).addTo(map);

        let locations = []; 
        let routeLayer = null; 
        let draggedItemIndex = null; 

        // 2. 地圖右鍵點擊事件：直接在點選的位置新增站點
        map.on('contextmenu', function(e) {
            const lat = e.latlng.lat;
            const lng = e.latlng.lng;
            const name = `地圖選點 (${lat.toFixed(4)}, ${lng.toFixed(4)})`;
            addLocation(name, lat, lng);
        });

        // 3. 輸入文字搜尋座標（呼叫免費 Nominatim API）
        async function addLocationFromInput() {
            const input = document.getElementById('search-input');
            const query = input.value.trim();
            if (!query) return;
            try {
                const response = await fetch(`https://openstreetmap.org{encodeURIComponent(query)}&limit=1`);
                const data = await response.json();
                if (data && data.length > 0) {
                    const lat = parseFloat(data.lat);
                    const lon = parseFloat(data.lon);
                    // 簡化顯示名稱
                    const shortName = data.display_name.split(',')[0];
                    addLocation(shortName, lat, lon);
                    map.setView([lat, lon], 13);
                    input.value = '';
                } else {
                    alert('找不到該地點，請輸入更詳細的名稱（例如：板橋區公所）。');
                }
            } catch (error) {
                alert('搜尋失敗，請稍後再試。');
            }
        }

        // 4. 新增站點到陣列並在地圖產生標記
        function addLocation(name, lat, lng) {
            const id = Date.now() + Math.random().toString(36).substr(2, 9);
            const marker = L.marker([lat, lng]).addTo(map);
            locations.push({ id, name, lat, lng, marker });
            updateLocationListUI();
            calculateRoute();
        }

        // 5. 刪除特定站點
        function deleteLocation(id) {
            const index = locations.findIndex(l => l.id === id);
            if (index !== -1) {
                map.removeLayer(locations[index].marker);
                locations.splice(index, 1);
                updateLocationListUI();
                calculateRoute();
            }
        }

        // 6. 更新左側地點列表與滑鼠拖曳排序事件
        function updateLocationListUI() {
            const listContainer = document.getElementById('location-list');
            listContainer.innerHTML = '';
            locations.forEach((loc, index) => {
                loc.marker.bindPopup(`<b>第 ${index + 1} 站</b><br>${loc.name}`);
                const item = document.createElement('div');
                item.className = 'location-item';
                item.draggable = true;
                item.innerHTML = `
                    <span class="handle">☰</span>
                    <span style="flex:1; overflow:hidden; text-overflow:ellipsis; white-space:nowrap;">
                        <strong>${index + 1}.</strong> ${loc.name}
                    </span>
                    <button class="delete-btn" onclick="deleteLocation('${loc.id}')">✕</button>
                `;
                item.addEventListener('dragstart', () => { draggedItemIndex = index; });
                item.addEventListener('dragover', (e) => { e.preventDefault(); });
                item.addEventListener('drop', (e) => {
                    e.preventDefault();
                    if (draggedItemIndex !== null && draggedItemIndex !== index) {
                        const movedItem = locations.splice(draggedItemIndex, 1)[0];
                        locations.splice(index, 0, movedItem);
                        updateLocationListUI();
                        calculateRoute();
                    }
                });
                listContainer.appendChild(item);
            });
        }

        // 7. 串接開源 OSRM 路由 API 計算路程公里與時間並畫線
        async function calculateRoute() {
            if (locations.length < 2) {
                if (routeLayer) map.removeLayer(routeLayer);
                document.getElementById('summary-content').innerHTML = '請先新增至少 2 個地點。';
                return;
            }
            const coordinates = locations.map(l => `${l.lng},${l.lat}`).join(';');
            const url = `https://project-osrm.org{coordinates}?overview=full&geometries=geojson`;
            try {
                const response = await fetch(url);
                const data = await response.json();
                if (data.code === 'Ok' && data.routes.length > 0) {
                    const route = data.routes[0];
                    const distanceKm = (route.distance / 1000).toFixed(2);
                    const durationMins = Math.round(route.duration / 60);
                    document.getElementById('summary-content').innerHTML = `
                        📍 總站數：<b>${locations.length}</b> 站<br>
                        🛣️ 總路程：<span style="color:#007bff; font-size:16px; font-weight:bold;">${distanceKm} km</span><br>
                        ⏱️ 總時間：<span style="color:#28a745; font-size:16px; font-weight:bold;">${durationMins} 分鐘</span>
                    `;
                    if (routeLayer) map.removeLayer(routeLayer);
                    routeLayer = L.geoJSON(route.geometry, {
                        style: { color: '#007bff', weight: 5, opacity: 0.7 }
                    }).addTo(map);
                    const group = new L.featureGroup(locations.map(l => l.marker));
                    map.fitBounds(group.getBounds().pad(0.1));
                } else {
                    document.getElementById('summary-content').innerHTML = '❌ 無法規劃此路線（可能包含無法開車跨越的區域）。';
                }
            } catch (error) {
                document.getElementById('summary-content').innerHTML = '❌ 路由計算失敗，請檢查網路連線。';
            }
        }

        // 8. 演算法：自動進行最短路徑排序（鄰近演算法）
        function autoOptimizeRoute() {
            if (locations.length < 3) {
                alert('請至少新增 3 個地點再進行自動優化。');
                return;
            }
            let unvisited = [...locations];
            let optimized = [];
            let current = unvisited.shift();
            optimized.push(current);
            while (unvisited.length > 0) {
                let nearestIndex = 0;
                let minDistance = Infinity;
                for (let i = 0; i < unvisited.length; i++) {
                    const d = Math.pow(current.lat - unvisited[i].lat, 2) + Math.pow(current.lng - unvisited[i].lng, 2);
                    if (d < minDistance) {
                        minDistance = d;
                        nearestIndex = i;
                    }
                }
                current = unvisited.splice(nearestIndex, 1)[0];
                optimized.push(current);
            }
            locations = optimized;
            updateLocationListUI();
            calculateRoute();
        }
    </script>
</body>
</html>

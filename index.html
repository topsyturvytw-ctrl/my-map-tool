<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<title>智慧路線規劃筆記本 (距離優化版)</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/rough.js/2.1.1/rough.js"></script>
<style>
  :root { --paper:#F3EEE4; --ink:#232323; --red:#B23A2E; }
  body { font-family: 'Noto Sans TC', sans-serif; background: var(--paper); display: flex; margin: 0; height: 100vh; }
  #sidebar { width: 350px; padding: 20px; border-right: 2px solid #ccc; overflow-y: auto; }
  #main { flex: 1; display: flex; align-items: center; justify-content: center; overflow: hidden; }
  .loc-item { background: #fff; padding: 10px; margin: 5px 0; border: 1px solid #999; border-radius: 4px; }
  input, button { width: 100%; margin: 5px 0; padding: 10px; }
  svg { width: 90%; height: 90%; }
</style>
</head>
<body>

<div id="sidebar">
  <h2>路線規劃器</h2>
  <input type="password" id="api-key" placeholder="輸入 OpenRouter API Key">
  <input type="text" id="loc-input" placeholder="輸入地點名稱...">
  <button onclick="addLoc()">加入地點</button>
  <div id="list"></div>
  <button onclick="optimizeRoute()" style="background:var(--red); color:#fff; font-weight:bold;">✨ AI 優化路徑與估算</button>
  <p id="status" style="font-size: 12px; color: #666;"></p>
</div>

<div id="main">
  <svg id="svg"></svg>
</div>

<script>
let locations = [];
let legsData = []; // 儲存真實計算過的距離與時間

async function callAI(prompt) {
  const key = document.getElementById('api-key').value;
  const res = await fetch("https://openrouter.ai/api/v1/chat/completions", {
    method: "POST",
    headers: { "Content-Type": "application/json", "Authorization": `Bearer ${key}` },
    body: JSON.stringify({
      "model": "openrouter/free",
      "messages": [{ "role": "user", "content": prompt + "\n請回傳 JSON: {\"order\":[], \"legs\":[{\"km\": 數字, \"minutes\": 數字}]}" }],
      "response_format": { "type": "json_object" }
    })
  });
  const data = await res.json();
  return JSON.parse(data.choices[0].message.content.replace(/```json|```/g, ''));
}

function addLoc() {
  const val = document.getElementById('loc-input').value;
  if(!val) return;
  locations.push({name: val});
  render();
  document.getElementById('loc-input').value = '';
}

async function optimizeRoute() {
  document.getElementById('status').innerText = "正在規劃路徑...";
  const prompt = `你是交通專家，請幫這些台灣地點安排最短路徑：${locations.map(l=>l.name).join(', ')}。請針對台灣實際地理距離（例如台北到樹林約15-20公里）提供精確的 km 與 minutes。`;
  
  try {
    const res = await callAI(prompt);
    locations = res.order.map(name => locations.find(l => l.name === name));
    legsData = res.legs;
    render();
    document.getElementById('status').innerText = "規劃完成！";
  } catch(e) {
    document.getElementById('status').innerText = "錯誤: " + e.message;
  }
}

function render() {
  const list = document.getElementById('list');
  list.innerHTML = locations.map((l, i) => `<div class="loc-item">${i+1}. ${l.name}</div>`).join('');
  
  const svg = document.getElementById('svg');
  svg.innerHTML = '';
  const rc = rough.svg(svg);
  
  locations.forEach((loc, i) => {
    const y = 80 + i * 120;
    svg.appendChild(rc.circle(200, y, 50, {fill: '#fff'}));
    const txt = document.createElementNS('http://www.w3.org/2000/svg', 'text');
    txt.setAttribute('x', 200); txt.setAttribute('y', y + 5);
    txt.setAttribute('text-anchor', 'middle');
    txt.textContent = loc.name;
    svg.appendChild(txt);
    
    if (legsData[i]) {
      svg.appendChild(rc.line(200, y + 25, 200, y + 95));
      const info = document.createElementNS('http://www.w3.org/2000/svg', 'text');
      info.setAttribute('x', 210); info.setAttribute('y', y + 60);
      info.setAttribute('fill', 'red');
      info.setAttribute('font-size', '14px');
      info.textContent = `${legsData[i].km}km / ${legsData[i].minutes}min`;
      svg.appendChild(info);
    }
  });
}
</script>
</body>
</html>

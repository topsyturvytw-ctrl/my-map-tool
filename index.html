<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>路線規劃筆記本 (完整功能版)</title>
<link href="https://fonts.googleapis.com/css2?family=Ma+Shan+Zheng&family=Noto+Sans+TC:wght@400;700&family=JetBrains+Mono&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/rough.js/2.1.1/rough.js"></script>
<style>
  :root { --paper:#F3EEE4; --paper-2:#EAE3D3; --ink:#232323; --red:#B23A2E; --jade:#3F6659; --line:#D8D0BC; }
  body { margin:0; display:flex; height:100vh; background:var(--paper); font-family:'Noto Sans TC', sans-serif; }
  #sidebar { width:360px; background:var(--paper-2); border-right:1px solid var(--line); display:flex; flex-direction:column; overflow-y:auto; }
  .pad { padding:20px; }
  input, button { padding:10px; border-radius:6px; border:1px solid var(--line); }
  .loc-item { display:flex; align-items:center; gap:10px; background:#fff; padding:10px; margin-bottom:6px; border-radius:6px; cursor:grab; }
  #main { flex:1; display:flex; flex-direction:column; }
  #canvas-wrap { flex:1; background:radial-gradient(var(--line) 1px, transparent 1px); background-size:22px 22px; }
  svg { width:100%; height:100%; }
</style>
</head>
<body>

<div id="sidebar">
  <div class="pad">
    <h1>路線規劃筆記本</h1>
    <input type="password" id="or-key-input" placeholder="貼上 OpenRouter API 金鑰" style="width:100%; margin-bottom:10px;">
    <input type="text" id="search-input" placeholder="輸入地點...">
    <button onclick="addLocationFromInput()">新增地點</button>
    <div id="location-list" style="margin-top:10px;"></div>
    <button onclick="aiSuggestOrder()" style="width:100%; background:var(--red); color:#fff; margin-top:10px;">✨ AI 自動排序並估算</button>
    <div id="status-line" style="font-size:12px; margin-top:10px;"></div>
    <div id="summary-content" style="margin-top:20px; font-size:13px;"></div>
  </div>
</div>

<div id="main">
  <div id="canvas-wrap"><svg id="diagram-svg"></svg></div>
</div>

<script>
let locations = [];
let legs = null;

async function callOpenRouter(promptText) {
  const apiKey = document.getElementById('or-key-input').value.trim();
  if(!apiKey) throw new Error('請先貼上 API 金鑰');

  const response = await fetch("https://openrouter.ai/api/v1/chat/completions", {
    method: "POST",
    headers: {
      "Content-Type": "application/json",
      "Authorization": "Bearer " + apiKey,
      "HTTP-Referer": window.location.origin,
      "X-Title": "Route Planner"
    },
    body: JSON.stringify({
      "model": "openrouter/free",
      "messages": [{ role: "user", content: promptText + "\n請回傳 JSON 格式：{\"order\":[], \"legs\":[{\"from\":\"\",\"to\":\"\",\"km\":0,\"minutes\":0}], \"note\":\"\"}" }],
      "response_format": { "type": "json_object" }
    })
  });

  const data = await response.json();
  return JSON.parse(data.choices[0].message.content.replace(/```json|```/g, ''));
}

function addLocationFromInput() {
  const input = document.getElementById('search-input');
  if(!input.value) return;
  locations.push({id: Math.random(), name: input.value});
  input.value = '';
  renderAll();
}

async function aiSuggestOrder() {
  document.getElementById('status-line').textContent = 'AI 思考中...';
  try {
    const prompt = `規劃這些地點的訪問順序，讓總距離最短: ${locations.map(l => l.name).join(', ')}`;
    const result = await callOpenRouter(prompt);
    // 更新地點順序與計算結果
    locations = result.order.map(name => locations.find(l => l.name === name));
    legs = result.legs;
    document.getElementById('status-line').textContent = '完成！';
    renderAll();
  } catch(e) {
    document.getElementById('status-line').textContent = '錯誤: ' + e.message;
  }
}

function renderAll() {
  const list = document.getElementById('location-list');
  list.innerHTML = locations.map((l, i) => `<div class="loc-item">${i+1}. ${l.name}</div>`).join('');
  renderDiagram();
}

function renderDiagram() {
  const svg = document.getElementById('diagram-svg');
  svg.innerHTML = '';
  const rc = rough.svg(svg);
  
  locations.forEach((loc, i) => {
    const x = 200, y = 100 + i * 150;
    svg.appendChild(rc.circle(x, y, 60, {fill: '#fff'}));
    
    // 繪製連線與文字
    if(legs && legs[i]) {
      svg.appendChild(rc.line(x, y+30, x, y+120));
      const txt = document.createElementNS('http://www.w3.org/2000/svg', 'text');
      txt.setAttribute('x', x + 40); txt.setAttribute('y', y + 75);
      txt.setAttribute('fill', 'red');
      txt.textContent = `${legs[i].km}km / ${legs[i].minutes}min`;
      svg.appendChild(txt);
    }
  });
}
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<title>路線規劃筆記本</title>
<link href="https://fonts.googleapis.com/css2?family=Ma+Shan+Zheng&family=Noto+Sans+TC:wght@400;700&family=JetBrains+Mono&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/rough.js/2.1.1/rough.js"></script>
<style>
  :root { --paper:#F3EEE4; --paper-2:#EAE3D3; --ink:#232323; --red:#B23A2E; --jade:#3F6659; --line:#D8D0BC; }
  body { margin:0; display:flex; height:100vh; background:var(--paper); font-family:'Noto Sans TC', sans-serif; }
  #sidebar { width:380px; background:var(--paper-2); border-right:1px solid var(--line); display:flex; flex-direction:column; }
  .pad { padding:20px; flex:1; overflow-y:auto; }
  .node-item { background:#fff; padding:12px; margin-bottom:8px; border-radius:6px; cursor:grab; border:1px solid #ccc; display:flex; align-items:center; }
  #main { flex:1; display:flex; align-items:center; justify-content:center; }
  #diagram { width:600px; height:800px; }
</style>
</head>
<body>

<div id="sidebar">
  <div class="pad">
    <h1>路線規劃筆記本</h1>
    <input type="password" id="api-key" placeholder="OpenRouter API Key">
    <input type="text" id="new-node" placeholder="輸入地點名稱...">
    <button onclick="addNode()">新增地點</button>
    <div id="node-list"></div>
    <button onclick="optimizeRoute()" style="background:var(--red); color:#fff; padding:15px; width:100%;">✨ 呼叫 AI 與地圖數據</button>
    <div id="log" style="font-size:12px; margin-top:10px; color:#555;"></div>
  </div>
</div>

<div id="main"><svg id="diagram"></svg></div>

<script>
let nodes = []; // 存地點
let legsData = []; // 存距離時間

function addNode() {
    const val = document.getElementById('new-node').value;
    if(!val) return;
    nodes.push({name: val, x: 300, y: 100 + nodes.length * 120});
    renderList();
    document.getElementById('new-node').value = '';
    draw();
}

function renderList() {
    const list = document.getElementById('node-list');
    list.innerHTML = nodes.map((n, i) => `<div class="node-item">${i+1}. ${n.name}</div>`).join('');
}

async function optimizeRoute() {
    document.getElementById('log').innerText = "正在規劃與計算...";
    // 這裡整合了 AI 優化順序的功能
    const prompt = `為這組地點安排最短路徑: ${nodes.map(n=>n.name).join(', ')}。請根據台灣地理常識回傳 JSON: {"order": [...], "legs": [{"km": 數字, "minutes": 數字}, ...]}`;
    
    // API 呼叫 (保留原本的邏輯)
    const res = await fetch("https://openrouter.ai/api/v1/chat/completions", {
        method: "POST",
        headers: {"Authorization": `Bearer ${document.getElementById('api-key').value}`, "Content-Type": "application/json"},
        body: JSON.stringify({
            "model": "openrouter/free",
            "messages": [{"role": "user", "content": prompt}],
            "response_format": {"type": "json_object"}
        })
    });
    const data = await res.json();
    const result = JSON.parse(data.choices[0].message.content);
    
    // 更新順序並存入距離數據
    nodes = result.order.map(name => nodes.find(n => n.name === name));
    legsData = result.legs;
    draw();
}

function draw() {
    const svg = document.getElementById('diagram');
    svg.innerHTML = '';
    const rc = rough.svg(svg);
    nodes.forEach((n, i) => {
        svg.appendChild(rc.circle(300, 100 + i*150, 60, {fill: '#fff'}));
        // 如果有數據，畫線並寫上距離
        if(legsData[i]) {
            svg.appendChild(rc.line(300, 130 + i*150, 300, 220 + i*150));
            const txt = document.createElementNS('http://www.w3.org/2000/svg', 'text');
            txt.setAttribute('x', 310); txt.setAttribute('y', 180 + i*150);
            txt.setAttribute('fill', 'red');
            txt.textContent = `${legsData[i].km}km / ${legsData[i].minutes}min`;
            svg.appendChild(txt);
        }
    });
}
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>路線規劃筆記本</title>
<link href="https://fonts.googleapis.com/css2?family=Ma+Shan+Zheng&family=Noto+Sans+TC:wght@400;500;700&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/rough.js/2.1.1/rough.js"></script>
<style>
  :root{ --paper:#F3EEE4; --paper-2:#EAE3D3; --ink:#232323; --red:#B23A2E; --jade:#3F6659; --line:#D8D0BC; }
  body{ margin:0; display:flex; height:100vh; background:var(--paper); font-family:'Noto Sans TC', sans-serif; }
  #sidebar{ width:360px; background:var(--paper-2); border-right:1px solid var(--line); padding:20px; overflow-y:auto; }
  .loc-item{ background:#fff; padding:12px; margin-bottom:8px; border-radius:6px; cursor:move; border:1px solid #ccc; }
  #main{ flex:1; display:flex; justify-content:center; align-items:center; }
  svg{ width:600px; height:800px; }
</style>
</head>
<body>
<div id="sidebar">
    <h1>路線規劃筆記本</h1>
    <input type="password" id="api-key" placeholder="OpenRouter API Key">
    <input type="text" id="loc-input" placeholder="輸入地點名稱...">
    <button onclick="addNode()">新增地點</button>
    <div id="node-list"></div>
    <button onclick="aiOptimize()" style="background:var(--red); color:#fff; padding:12px; width:100%; border:none; margin-top:10px;">✨ AI 優化排序與數據</button>
    <div id="status" style="margin-top:10px; font-size:12px;"></div>
</div>
<div id="main"><svg id="diagram"></svg></div>
<script>
let nodes = [];
let legsData = [];

function addNode() {
    const val = document.getElementById('loc-input').value;
    if(!val) return;
    nodes.push({name: val});
    renderList();
    document.getElementById('loc-input').value = '';
    renderDiagram();
}

function renderList() {
    const list = document.getElementById('node-list');
    list.innerHTML = nodes.map((n, i) => `
        <div class="loc-item" draggable="true" ondragstart="startDrag(${i})" ondrop="drop(${i})" ondragover="allowDrop(event)">
            ${i+1}. ${n.name}
        </div>`).join('');
}
let draggedIdx = null;
function startDrag(i) { draggedIdx = i; }
function allowDrop(e) { e.preventDefault(); }
function drop(i) {
    const temp = nodes[draggedIdx];
    nodes[draggedIdx] = nodes[i];
    nodes[i] = temp;
    renderList(); renderDiagram();
}

async function aiOptimize() {
    document.getElementById('status').innerText = "AI 正在計算路徑...";
    const prompt = `為這些地點規劃最短路徑: ${nodes.map(n=>n.name).join(', ')}。請回傳 JSON: {"order": [...], "legs": [{"km": 數字, "minutes": 數字}, ...]}`;
    const res = await fetch("https://openrouter.ai/api/v1/chat/completions", {
        method: "POST",
        headers: {"Authorization": `Bearer ${document.getElementById('api-key').value}`, "Content-Type": "application/json"},
        body: JSON.stringify({
            "model": "openrouter/free",
            "messages": [{"role": "user", "content": prompt}],
            "response_format": {"type": "json_object"}
        })
    });
    const data = await res.json();
    const result = JSON.parse(data.choices[0].message.content.replace(/```json|```/g,''));
    nodes = result.order.map(name => nodes.find(n => n.name === name));
    legsData = result.legs;
    renderList(); renderDiagram();
    document.getElementById('status').innerText = "完成！";
}
  function renderDiagram() {
    const svg = document.getElementById('diagram');
    svg.innerHTML = '';
    const rc = rough.svg(svg);
    nodes.forEach((n, i) => {
        const y = 100 + i * 150;
        svg.appendChild(rc.circle(300, y, 60, {fill: '#fff', strokeWidth: 2}));
        
        const txt = document.createElementNS('http://www.w3.org/2000/svg','text');
        txt.setAttribute('x', 300); txt.setAttribute('y', y+5);
        txt.setAttribute('text-anchor','middle');
        txt.textContent = n.name;
        svg.appendChild(txt);

        if(legsData[i]) {
            svg.appendChild(rc.line(300, y+30, 300, y+120, {strokeWidth:2}));
            const label = document.createElementNS('http://www.w3.org/2000/svg','text');
            label.setAttribute('x', 315); label.setAttribute('y', y+80);
            label.setAttribute('fill', 'red');
            label.setAttribute('font-weight', 'bold');
            label.textContent = `${legsData[i].km}km / ${legsData[i].minutes}min`;
            svg.appendChild(label);
        }
    });
}
</script>
</body>
</html>

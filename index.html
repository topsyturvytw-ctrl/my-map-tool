<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<title>路線規劃筆記本 - 數據視覺化版</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/rough.js/2.1.1/rough.js"></script>
<style>
  body { background: #F3EEE4; font-family: 'Noto Sans TC', sans-serif; display: flex; height: 100vh; margin: 0; }
  #sidebar { width: 350px; padding: 20px; border-right: 1px solid #ccc; overflow-y: auto; }
  #main { flex: 1; display: flex; align-items: center; justify-content: center; }
  svg { width: 600px; height: 800px; }
  .btn { background: #B23A2E; color: white; padding: 10px; border: none; cursor: pointer; width: 100%; }
</style>
</head>
<body>

<div id="sidebar">
  <h2>路線規劃器</h2>
  <input type="text" id="loc-input" placeholder="輸入地點...">
  <button onclick="addLoc()">新增地點</button>
  <div id="list" style="margin: 20px 0;"></div>
  <button class="btn" onclick="aiOptimize()">✨ AI 分析路徑與估算</button>
  <p id="status"></p>
</div>

<div id="main">
  <svg id="svg"></svg>
</div>

<script>
let locations = [];
let legsData = []; // 關鍵：儲存結構化數據

function addLoc() {
    const val = document.getElementById('loc-input').value;
    if(!val) return;
    locations.push(val);
    document.getElementById('list').innerHTML += `<div>${locations.length}. ${val}</div>`;
    document.getElementById('loc-input').value = '';
}

async function aiOptimize() {
    document.getElementById('status').innerText = "AI 運算中...";
    // 強制 AI 輸出 JSON
    const prompt = `請規劃路徑: ${locations.join(' -> ')}。請回傳 JSON: {"legs": [{"from":"A", "to":"B", "km": 數字, "minutes": 數字}, ...]}`;
    
    // 這裡替換成你的 callOpenRouter 邏輯
    const response = await fetch("https://openrouter.ai/api/v1/chat/completions", {
        method: "POST",
        headers: {"Content-Type": "application/json", "Authorization": "Bearer 你的API_KEY"},
        body: JSON.stringify({
            "model": "openrouter/free",
            "messages": [{"role": "user", "content": prompt}],
            "response_format": {"type": "json_object"}
        })
    });
    
    const data = await response.json();
    const result = JSON.parse(data.choices[0].message.content);
    
    // 關鍵：將 AI 的數據存入全域變數
    legsData = result.legs;
    document.getElementById('status').innerText = "規劃完成！";
    renderDiagram();
}

function renderDiagram() {
    const svg = document.getElementById('svg');
    svg.innerHTML = '';
    const rc = rough.svg(svg);
    
    locations.forEach((name, i) => {
        const y = 80 + i * 150;
        svg.appendChild(rc.circle(300, y, 60, {fill: '#fff'}));
        
        // 繪製連線並印出數據
        if(legsData[i]) {
            svg.appendChild(rc.line(300, y+30, 300, y+120));
            
            // 將 AI 產出的數字直接轉為 SVG 文字
            const txt = document.createElementNS('http://www.w3.org/2000/svg', 'text');
            txt.setAttribute('x', 320); txt.setAttribute('y', y + 80);
            txt.setAttribute('fill', 'red');
            txt.setAttribute('font-weight', 'bold');
            txt.textContent = `${legsData[i].km}km / ${legsData[i].minutes}min`;
            svg.appendChild(txt);
        }
    });
}
</script>
</body>
</html>
